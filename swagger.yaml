openapi: 3.0.1
info:
  title: Virtual Registry Management RESTful API
  description: ASUS Enterprise Virtual Registry Management 以 Portal 需求列出其需要的 Restful
    API Response 以 Json 格式呈現
  contact: {}
  version: 0.1.4
servers:
- url: //localhost:9999/vrm/api/v1
paths:
  /admin/export/:{export-id}:
    get:
      tags:
      - Admin/Export
      summary: 取得指定的匯出資訊
      description: Retrieve export details by export ID
      parameters:
      - name: export-id
        in: path
        description: Export ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin.GetExportOutput'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
    delete:
      tags:
      - Admin/Export
      summary: 刪除指定的匯出紀錄
      description: Delete an export record by its ID
      parameters:
      - name: export-id
        in: path
        description: Export ID
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin.DeleteExportOutput'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
  /admin/exports:
    get:
      tags:
      - Admin/Export
      summary: 列出所有的匯出資訊
      description: Get a paginated list of exports with optional filtering
      parameters:
      - name: limit
        in: query
        description: Number of items to return
        schema:
          type: integer
          default: 100
      - name: offset
        in: query
        description: Number of items to skip
        schema:
          type: integer
          default: 0
      - name: where
        in: query
        description: Filter conditions
        style: form
        explode: false
        schema:
          type: array
          items:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin.ListExportsOutput'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
  /admin/import:
    post:
      tags:
      - Admin/Image
      summary: 匯入 Image (已存在於openstack)
      description: Creates a common tag from an existing OpenStack Glance image and
        sets it as public
      requestBody:
        description: Import image request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/admin.ImportImageInput'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin.ImportImageOutput'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
      x-codegen-request-body-name: body
  /admin/memberacl/:{member-acl-id}:
    delete:
      tags:
      - Admin/MemberAcl
      summary: 刪除指定的 member-acl
      description: Delete a specific member ACL by ID
      parameters:
      - name: member-acl-id
        in: path
        description: Member ACL ID
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
          content: {}
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
  /admin/project/:{project-id}:
    get:
      tags:
      - Admin/Project
      summary: 取得 project 資訊
      description: Get project usage statistics and limits information
      parameters:
      - name: project-id
        in: path
        description: Project ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin.GetProjectInfoOutput'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
    put:
      tags:
      - Admin/Project
      summary: 更新指定的 project
      description: Update the soft limit count and size for a project
      parameters:
      - name: project-id
        in: path
        description: Project ID
        required: true
        schema:
          type: string
      requestBody:
        description: Update project request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/admin.UpdateProjectInput'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin.UpdateProjectOutput'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
      x-codegen-request-body-name: request
  /admin/project/:{project-id}/server/:{server-id}/snapshot:
    post:
      tags:
      - Admin/Snapshot
      summary: 對 Server 建立 snapshot
      description: "Create a snapshot of a VPS server, either by creating a new repository\
        \ or using an existing one"
      parameters:
      - name: project-id
        in: path
        description: Project ID
        required: true
        schema:
          type: string
      - name: server-id
        in: path
        description: Server ID
        required: true
        schema:
          type: string
      requestBody:
        description: Snapshot creation parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/admin.CreateSnapshotInput'
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin.CreateSnapshotOutput'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
      x-codegen-request-body-name: data
  /admin/projectacl:
    post:
      tags:
      - Admin/ProjectAcl
      summary: 在指定的 tag 創建 project-acl 分享給其他成員使用
      description: Create a new project access control list entry for tag sharing
        and project access management
      requestBody:
        description: Project ACL creation payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/admin.CreateProjectAclInput'
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin.CreateProjectAclOutput'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
      x-codegen-request-body-name: body
  /admin/projectacl/:{project-acl-id}:
    delete:
      tags:
      - Admin/ProjectAcl
      summary: 指定的 tag 停止分享給其他成員使用
      description: Delete a specific project ACL by ID or remove project ACL from
        a tag
      parameters:
      - name: project-acl-id
        in: path
        description: Project ACL ID (when deleting specific ACL)
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
          content: {}
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
  /admin/projectacls:
    get:
      tags:
      - Admin/ProjectAcl
      summary: 取得所有 project-acl
      description: List project ACLs with pagination and filtering support
      parameters:
      - name: limit
        in: query
        description: "Number of items to return (default: 100)"
        schema:
          type: integer
      - name: offset
        in: query
        description: "Number of items to skip (default: 0)"
        schema:
          type: integer
      - name: where
        in: query
        description: Filter conditions
        style: form
        explode: false
        schema:
          type: array
          items:
            type: string
      - name: namespace
        in: query
        description: Filter by namespace
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin.ListProjectAclsOutput'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
  /admin/projects:
    get:
      tags:
      - Admin/Project
      summary: 取得 project 資訊
      description: List all projects with their usage statistics and limits
      parameters:
      - name: limit
        in: query
        description: "Number of items to return (default: 100)"
        schema:
          type: integer
      - name: offset
        in: query
        description: "Number of items to skip (default: 0)"
        schema:
          type: integer
      - name: namespace
        in: query
        description: Filter by namespace
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin.ListProjectsOutput'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
  /admin/repositories:
    get:
      tags:
      - Admin/Repository
      summary: 列出所有的 repositories
      description: Get a paginated list of repositories with optional filtering
      parameters:
      - name: limit
        in: query
        description: Limit number of results
        schema:
          type: integer
          default: 100
      - name: offset
        in: query
        description: Offset for pagination
        schema:
          type: integer
          default: 0
      - name: where
        in: query
        description: Filter conditions
        style: form
        explode: false
        schema:
          type: array
          items:
            type: string
      - name: namespace
        in: query
        description: Filter by namespace
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin.ListRepositoriesOutput'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
  /admin/repository:
    post:
      tags:
      - Admin/Repository
      summary: 創建 repository
      description: Create a new repository with administrative privileges
      requestBody:
        description: Repository creation payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/admin.CreateRepositoryInput'
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin.CreateRepositoryOutput'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
      x-codegen-request-body-name: body
  /admin/repository/:{repository-id}:
    get:
      tags:
      - Admin/Repository
      summary: 取得指定的 repository
      description: Get detailed information about a specific repository
      parameters:
      - name: repository-id
        in: path
        description: Repository ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin.GetRepositoryOutput'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
    put:
      tags:
      - Admin/Repository
      summary: 更新指定的 repository
      description: Update an existing repository with administrative privileges
      parameters:
      - name: repository-id
        in: path
        description: Repository ID
        required: true
        schema:
          type: string
      requestBody:
        description: Repository update payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/admin.UpdateRepositoryInput'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin.UpdateRepositoryOutput'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
      x-codegen-request-body-name: body
    delete:
      tags:
      - Admin/Repository
      summary: 棄用指定的 repository
      description: Delete a specific repository and all its associated tags (if not
        protected)
      parameters:
      - name: repository-id
        in: path
        description: Repository ID
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
          content: {}
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
  /admin/repository/:{repository-id}/protect:
    post:
      tags:
      - Admin/Repository
      summary: 設定保護指定的 repository (避免被刪除)
      description: Enable protection for a specific repository with administrative
        privileges
      parameters:
      - name: repository-id
        in: path
        description: Repository ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin.SetRepositoryProtectOutput'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
    delete:
      tags:
      - Admin/Repository
      summary: 解除保護指定的 repository
      description: Disable protection for a specific repository with administrative
        privileges
      parameters:
      - name: repository-id
        in: path
        description: Repository ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin.UnsetRepositoryProtectOutput'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
  /admin/tag:
    post:
      tags:
      - Admin/Tag
      summary: 創建 tag
      description: Create a new tag with administrative privileges and simultaneously
        create an empty Glance image
      requestBody:
        description: Tag creation payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/admin.CreateTagInput'
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin.CreateTagOutput'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
      x-codegen-request-body-name: body
  /admin/tag/:{tag-id}:
    get:
      tags:
      - Admin/Tag
      summary: 取得指定的 tag
      description: Get detailed information about a specific tag
      parameters:
      - name: tag-id
        in: path
        description: Tag ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin.GetTagOutput'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
    put:
      tags:
      - Admin/Tag
      summary: 更新指定的 tag
      description: Update an existing tag with administrative privileges
      parameters:
      - name: tag-id
        in: path
        description: Tag ID
        required: true
        schema:
          type: string
      requestBody:
        description: Tag update payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/admin.UpdateTagInput'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin.UpdateTagOutput'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualRegistryManagement_utility.ErrResponse'
        "403":
          description: Forbidden
          content:
